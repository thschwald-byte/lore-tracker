# Issue #362 + #764: Dependency-CVE-Audit als EIGENER Woodpecker-Workflow.
#
# Warum separat (Issue #764): am 2026-07-09 starb der deps_audit-Step zweimal
# an einem Docker-Daemon-Fehler des Runners ("no available IPv4 addresses on
# this network's address pools", 0 s Laufzeit) — Daemon-Level-Fehler umgehen
# `failure: ignore` und cancelten den gesamten Workflow inkl. deploy. Als
# eigener Workflow meldet ein Audit-Fehler (egal ob Advisory oder Infra) nur
# den eigenen Status-Kontext ci/woodpecker/pr/audit — der ist NICHT in der
# Branch-Protection required und cancelt keinen Deploy.
#
# `mix deps.audit` (mix_audit) matcht die mix.lock gegen die
# Elixir-Security-Advisory-DB.
#
# `--ignore-advisory-ids GHSA-52mm-h59v-f3c7` (#692): earmark ≤ 1.5.0-pre1
# trägt eine MODERATE-Advisory (Stored XSS via unescaped HTML attribute
# values). Kein Patch verfügbar (First-patched leer, Paket retired). Bewertet
# als mitigiert: seit #604 läuft JEDER Markdown-Anzeige-Pfad über
# render_md_safe/1 (Earmark escape: true + HtmlSanitizeEx.basic_html) — der
# Sanitizer strippt attributbasierte XSS-Vektoren nach dem Earmark-Render;
# ein Regressionstest (render_md_safe_test.exs) asserted den Single-Path.
# Ignore + Begründung, bis ein Fix/Nachfolger da ist → dann Bump + Ignore raus.
# (Der frühere cowlib-Ignore GHSA-g2wm-735q-3f56 ist seit cowlib 2.18.0 obsolet.)
#
# `failure: ignore` (WARN-Soak, #557-Lesson): eine NEUE Advisory taucht im
# CI-Log auf, blockt aber keinen unbeteiligten PR. Blocking-Flip (Security-
# Gate scharf) = `failure: ignore` entfernen + Kontext in die Branch-
# Protection aufnehmen.

when:
  - event: push
    branch: master
  - event: pull_request

steps:
  deps_audit:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    failure: ignore
    environment:
      MIX_ENV: dev
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix deps.audit --ignore-advisory-ids "GHSA-52mm-h59v-f3c7"
