# Codeberg-Woodpecker CI/CD for LoreTracker.
#
# - compile (warnings-as-errors) über das ganze Umbrella auf jedem Push + PR
# - hub-Test-Suite (stateless seit #164 — kein Postgres, kein Ecto)
# - deploy to Gigalixir on push to master
#
# Required secrets (Codeberg-Repo → Settings → CI/CD → Secrets):
#   gigalixir_email     — Gigalixir account e-mail
#   gigalixir_api_key   — `gigalixir account:api_key`
#   gigalixir_app_name  — Gigalixir app name, e.g. "loretracker"

when:
  - event: push
    branch: master
  - event: pull_request

steps:
  # Ganzes Umbrella mit --warnings-as-errors — fängt Drift in hub + worker +
  # shared. Worker wird hier nur kompiliert, nicht getestet (Worker-Tests
  # brauchen whisper-cli/Ollama, die im CI-Image nicht da sind).
  compile:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    environment:
      MIX_ENV: dev
    commands:
      # heroicons ist ein Git-Dep (github.com/tailwindlabs/heroicons.git) →
      # deps.get braucht git, das im hexpm/elixir-Image fehlt.
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix compile --warnings-as-errors

  # Issue #544 + #793: Credo-AST-Linter, FULL-SCAN blockend. `mix credo` scannt
  # das ganze Umbrella; JEDER Verstoß (God-Module, roher EventBridge.publish,
  # unescaped Markdown, Event-Kind-String statt Shared.Events-SSoT) rotet den
  # PR-Check und blockt den Merge (`mix credo` exitet 16 bei Findings, 0 sauber).
  #
  # #793: WARN-Soak vorbei → BLOCKEND (kein `failure: ignore` mehr, analog
  # Dialyzer #619 / Coverage #658; #557-Lesson erfüllt: erst beobachten, dann
  # blockieren). Der Bestands-Backlog wurde vorher auf 0 geräumt (#789: 21
  # Event-Kinds → Shared.Events-SSoT; #791: transcribe.ex God-Module-Split). Der
  # Full-Scan braucht KEINEN merge-base → die frühere git-fetch/unshallow-
  # Mechanik samt ihrem Fetch-Flake-Risiko (das im Non-Blocking-Modus toleriert
  # war) ist ersatzlos entfallen. Neu hinzugefügte Verstöße blocken ab jetzt.
  credo:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    environment:
      MIX_ENV: dev
    commands:
      # git nur für den heroicons-Git-Dep (deps.get) — credo full-scan ruft kein git.
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix credo --checks LoreTracker.Credo.Check
    depends_on: [compile]

  # Issue #540 + #589 + #619: Dialyzer — Spec-Drift / Typ-Fehler / dead
  # {:error,_}-Pfade (die Return-/Typ-Hälfte der Silent-Failure-Klasse).
  # Findings-Cleanup ist durch (#589: 80 → 0), der PR-Soak (#603, warn-Modus) ist
  # gelaufen → **Blocking** (kein `failure: ignore` mehr): ein neues actionable
  # Dialyzer-Finding rotet den PR-Check und blockt den Merge (echtes Merge-Gate,
  # #557-Lesson: erst beobachten, dann blockieren — jetzt erfüllt). Neue Dep-FPs
  # gehören VOR dem Merge mit Begründung in `.dialyzer_ignore.exs`.
  #
  # Kostenhinweis: kein Cross-Pipeline-PLT-Cache auf Codeberg-Woodpecker → der
  # PLT-Build (~2,5 min) + Analyse (~1 min) läuft pro PR neu.
  #
  # Issue #668: depends_on KEIN `[compile]` mehr, sondern `[test]`. Begründung:
  # `test` baut MIX_ENV=test, `dialyzer` baut MIX_ENV=dev — zwei volle Dep-
  # Compiles (phoenix_live_view + tabler_icons) parallel sprengten den Codeberg-
  # Runner-RAM. Symptom: dialyzer + test + (via test) coverage enden gemeinsam
  # mit exit_code 0 / graceful_stop mitten im Dep-Compile, ohne dass je ein Test
  # lief. Reihenfolge jetzt: compile → test → (dialyzer + coverage parallel).
  # coverage re-kompiliert nicht (reused _build/test) → dialyzer ist der einzige
  # schwere Compile-Job zur Zeit → kein OOM. Kostet ~+3,5 min Wall-Clock,
  # billiger als das Re-Trigger-Roulette. Gatet den deploy NICHT (nicht in
  # dessen depends_on) → Deploy-Latenz unberührt.
  dialyzer:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    when:
      - event: pull_request
      - event: push
        branch: master
    environment:
      MIX_ENV: dev
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix dialyzer
    depends_on: [test]

  # deps_audit lebt seit Issue #764 in einem EIGENEN Workflow
  # (.woodpecker/audit.yml): am 2026-07-09 cancelte ein Docker-Daemon-Fehler
  # des Runners im deps_audit-Container (trotz failure: ignore — Daemon-Level-
  # Fehler umgehen das Step-Attribut) den ganzen Workflow inkl. deploy.
  # Als separater Workflow rotet ein Audit-Infra-Fehler nur den eigenen,
  # nicht-required Status-Kontext (ci/woodpecker/pr/audit) — der Deploy
  # läuft unberührt.

  # Issue #537: per-Modul-Coverage-Floor. ExCoveralls erzeugt den Report pro App
  # (`mix coveralls.json` → cover/excoveralls.json), `mix lore.coverage_floor`
  # prüft pro kritischem Modul einen eigenen Floor (ExCoveralls kennt nur einen
  # globalen minimum_coverage). Floors sind ein Ratchet auf dem heutigen Stand
  # (verhindert Drift: neue ungetestete Klausel → Coverage fällt → Hit).
  #
  # Issue #658: WARN-Soak vorbei → BLOCKEND (kein `failure: ignore` mehr, wie
  # dialyzer in #619). Der Soak hatte einen Floor-Breach (CloudHelper 52,4 %)
  # still durchgelassen — genau die Silent-Failure-Klasse, die der Gate schließt.
  # coverage_floor ist deterministisch (kein LLM) → kein Flaky-Risiko. Ein
  # Floor-Unterschritt rotet jetzt den PR-Check. Re-runt die Suites unter
  # Coverage (separat vom `test`-Step) → ~+1 Suite-Lauf Wall-Clock.
  coverage:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    environment:
      MIX_ENV: test
      LORE_MNESIA_DIR: /tmp/lore_mnesia_cov
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix cmd --app hub mix coveralls.json
      - mix cmd --app worker mix coveralls.json
      - mix lore.coverage_floor
    # Nach `test` (nicht parallel): beide compilen MIX_ENV=test ins geteilte
    # _build/test → paralleler Lauf klobbert sich (File.Error beim .beam-Write).
    # Sequenziell nach test ist _build/test schon da → kein Race.
    depends_on: [test]

  # Hub ist seit Issue #164 (Etappe 5c) vollständig stateless: keine Postgres-
  # Dep, kein Ecto-Repo, keine Migrationen. Die Test-Suite läuft rein im RAM
  # (PubSub + WorkerJWT + Reader-Stub). Nur die hub-App testen — sie ist das,
  # was deployt wird (`mix release.hub` = hub + shared).
  test:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    environment:
      MIX_ENV: test
      LORE_MNESIA_DIR: /tmp/lore_mnesia
    commands:
      # git für den heroicons-Git-Dep (fehlt im hexpm/elixir-Image).
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix cmd --app hub mix test
      # Issue #66: Worker-Suite mit-gaten (lief bisher nur lokal). Mnesia via
      # LORE_MNESIA_DIR (oben gesetzt); `:stt_bench`-Tests (whisper/ffmpeg-
      # Integration) sind in apps/worker/test/test_helper.exs excludet, daher
      # ohne externe Binaries CI-safe.
      - mix cmd --app worker mix test
    # Nach compile (nicht parallel): compile + test teilen sich den Workspace;
    # parallele `mix deps.get` kollidieren am heroicons-Git-Lock. Sequenziell
    # ist deps/ schon da → kein Race, und schneller.
    depends_on: [compile]

  # Gigalixir-Buildpack baut den prod-Release (hub + shared). Kein
  # `ps:migrate` mehr — der Hub hat kein Schema (stateless seit #164).
  deploy:
    image: python:3.12-slim
    when:
      - event: push
        branch: master
    environment:
      GIGALIXIR_EMAIL:
        from_secret: gigalixir_email
      GIGALIXIR_API_KEY:
        from_secret: gigalixir_api_key
      GIGALIXIR_APP_NAME:
        from_secret: gigalixir_app_name
    commands:
      # Reiner git-push — keine gigalixir-CLI nötig. Auth via ~/.netrc statt
      # Creds-in-der-URL: die E-Mail enthält ein '@', das die URL-Form
      # https://user:pass@host zerschießt (git liest den Host falsch →
      # "Port number was not a decimal number"). netrc umgeht das sauber.
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - git config --global user.email "ci@codeberg"
      - git config --global user.name "Codeberg CI"
      - printf 'machine git.gigalixir.com login %s password %s\n' "$GIGALIXIR_EMAIL" "$GIGALIXIR_API_KEY" > ~/.netrc
      - chmod 600 ~/.netrc
      - git remote add gigalixir "https://git.gigalixir.com/$GIGALIXIR_APP_NAME.git"
      # Issue #31: der Woodpecker-Clone ist SHALLOW → gigalixir rejected den Push
      # mit "shallow update not allowed". Vor dem Push die volle Historie
      # nachholen. 2026-07-16: ein Codeberg-504 auf dem fetch wurde vom früheren
      # einfachen `|| true` STILL geschluckt → shallow-Push → roter Step,
      # obwohl das Release real deployte (Slug/Release laufen vor dem
      # Ref-Update; Silent-Failure-Klasse). Jetzt: bis zu 3 Versuche mit
      # Backoff; das finale `|| true` bleibt (der Push deployt notfalls auch
      # shallow — der Ref-Reject ist dann sichtbar im Log, nicht verschluckt).
      - for i in 1 2 3; do git fetch --unshallow origin && break; git fetch origin && break; echo "fetch $i fehlgeschlagen (Codeberg 504?), retry in 20s"; sleep 20; done || true
      # force: der gigalixir-master ist nur ein Deploy-Pointer (kein Source-of-
      # Truth). Bei Divergenz (alter/manueller Deploy-Stand) würde ein normaler
      # Push mit "rejected (fetch first)" scheitern — Standard bei PaaS-Deploys.
      - git push --force gigalixir HEAD:refs/heads/master
    depends_on: [compile, test]

  # Issue #876: Post-Deploy-Verify (Free-Tier-Guard). Der deploy-Step endet mit
  # dem git-push — Buildpack-Build + Pod-Start passieren DANACH, unbeobachtet.
  # Dieser Step pollt die Gigalixir-API bis das Release mit CI_COMMIT_SHA live
  # ist, und prüft dann: Pods Healthy, replicas 1/1, kein OOMKilled-lastState
  # (400-MB-RAM-Limit bei size 0.4!), size <= 0.5 + genau 1 Replica (Free-Tier-
  # Konformität), HTTP 200/301/302/303 auf /, Grace-Recheck nach 30 s gegen
  # schnelle Crash-Loops. Ein kaputtes Deploy rotet damit die Pipeline, statt
  # still tot zu sein, bis ein User klagt. Nur Python-Stdlib — kein pip-Install.
  deploy_verify:
    image: python:3.12-slim
    when:
      - event: push
        branch: master
    environment:
      GIGALIXIR_EMAIL:
        from_secret: gigalixir_email
      GIGALIXIR_API_KEY:
        from_secret: gigalixir_api_key
      GIGALIXIR_APP_NAME:
        from_secret: gigalixir_app_name
    commands:
      - python3 tools/ci/deploy_verify.py
    depends_on: [deploy]
