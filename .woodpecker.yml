# Codeberg-Woodpecker CI/CD for LoreTracker.
#
# - compile (warnings-as-errors) über das ganze Umbrella auf jedem Push + PR
# - hub-Test-Suite (stateless seit #164 — kein Postgres, kein Ecto)
# - deploy to Gigalixir on push to master
#
# Required secrets (Codeberg-Repo → Settings → CI/CD → Secrets):
#   gigalixir_email     — Gigalixir account e-mail
#   gigalixir_api_key   — `gigalixir account:api_key`
#   gigalixir_app_name  — Gigalixir app name, e.g. "loretracker"

when:
  - event: push
    branch: master
  - event: pull_request

steps:
  # Ganzes Umbrella mit --warnings-as-errors — fängt Drift in hub + worker +
  # shared. Worker wird hier nur kompiliert, nicht getestet (Worker-Tests
  # brauchen whisper-cli/Ollama, die im CI-Image nicht da sind).
  compile:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    environment:
      MIX_ENV: dev
    commands:
      # heroicons ist ein Git-Dep (github.com/tailwindlabs/heroicons.git) →
      # deps.get braucht git, das im hexpm/elixir-Image fehlt.
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix compile --warnings-as-errors

  # Issue #544: Credo-AST-Linter mit DIFF-SCOPE (Clean-as-You-Code). `credo diff
  # --from-git-merge-base origin/master` flaggt nur Verstöße, die DIESER PR ggü.
  # dem Abzweigpunkt von master NEU hinzufügt — der bestehende Backlog (94
  # warns, God-Module etc.) blockt nie. `credo diff` exitet 16 bei added, 0
  # sonst → der ideale Enforcement-Primitiv.
  #
  # Noch `failure: ignore` (WARN-Modus, #557-Lesson: erst beobachten, dann
  # blockieren). Solange non-blocking, kann auch die git-Fetch-Mechanik unten
  # fehlschlagen, ohne jemandes CI zu brechen — der Soak deckt beides auf.
  # Blocking-Flip = nur dieses `failure: ignore` entfernen.
  credo:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    failure: ignore
    environment:
      MIX_ENV: dev
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      # credo diff braucht die Historie bis zum merge-base + den master-Ref.
      # Der Woodpecker-Clone ist shallow → unshallow (Fallback wenn schon voll)
      # + master holen. safe.directory gegen "dubious ownership" beim git-Aufruf
      # aus credo heraus.
      - git config --global --add safe.directory '*'
      - git fetch --no-tags --unshallow origin 2>/dev/null || git fetch --no-tags origin || true
      - git fetch --no-tags origin master:refs/remotes/origin/master 2>/dev/null || true
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix credo diff --from-git-merge-base origin/master --checks LoreTracker.Credo.Check
    depends_on: [compile]

  # Hub ist seit Issue #164 (Etappe 5c) vollständig stateless: keine Postgres-
  # Dep, kein Ecto-Repo, keine Migrationen. Die Test-Suite läuft rein im RAM
  # (PubSub + WorkerJWT + Reader-Stub). Nur die hub-App testen — sie ist das,
  # was deployt wird (`mix release.hub` = hub + shared).
  test:
    image: hexpm/elixir:1.19.5-erlang-27.3-debian-bookworm-20260518
    environment:
      MIX_ENV: test
      LORE_MNESIA_DIR: /tmp/lore_mnesia
    commands:
      # git für den heroicons-Git-Dep (fehlt im hexpm/elixir-Image).
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - mix local.hex --force
      - mix local.rebar --force
      - mix deps.get
      - mix cmd --app hub mix test
      # Issue #66: Worker-Suite mit-gaten (lief bisher nur lokal). Mnesia via
      # LORE_MNESIA_DIR (oben gesetzt); `:stt_bench`-Tests (whisper/ffmpeg-
      # Integration) sind in apps/worker/test/test_helper.exs excludet, daher
      # ohne externe Binaries CI-safe.
      - mix cmd --app worker mix test
    # Nach compile (nicht parallel): compile + test teilen sich den Workspace;
    # parallele `mix deps.get` kollidieren am heroicons-Git-Lock. Sequenziell
    # ist deps/ schon da → kein Race, und schneller.
    depends_on: [compile]

  # Gigalixir-Buildpack baut den prod-Release (hub + shared). Kein
  # `ps:migrate` mehr — der Hub hat kein Schema (stateless seit #164).
  deploy:
    image: python:3.12-slim
    when:
      - event: push
        branch: master
    environment:
      GIGALIXIR_EMAIL:
        from_secret: gigalixir_email
      GIGALIXIR_API_KEY:
        from_secret: gigalixir_api_key
      GIGALIXIR_APP_NAME:
        from_secret: gigalixir_app_name
    commands:
      # Reiner git-push — keine gigalixir-CLI nötig. Auth via ~/.netrc statt
      # Creds-in-der-URL: die E-Mail enthält ein '@', das die URL-Form
      # https://user:pass@host zerschießt (git liest den Host falsch →
      # "Port number was not a decimal number"). netrc umgeht das sauber.
      - apt-get update -qq && apt-get install -y --no-install-recommends git
      - git config --global user.email "ci@codeberg"
      - git config --global user.name "Codeberg CI"
      - printf 'machine git.gigalixir.com login %s password %s\n' "$GIGALIXIR_EMAIL" "$GIGALIXIR_API_KEY" > ~/.netrc
      - chmod 600 ~/.netrc
      - git remote add gigalixir "https://git.gigalixir.com/$GIGALIXIR_APP_NAME.git"
      # Issue #31: der Woodpecker-Clone ist SHALLOW → gigalixir rejected den Push
      # mit "shallow update not allowed" (gigalixir baut den Slug zwar, lehnt aber
      # das Ref-Update ab → Step rot, kein Deploy). Vor dem Push die volle
      # Historie von Codeberg nachholen. --unshallow scheitert auf einem bereits
      # vollständigen Repo ("does not make sense") → Fallback auf fetch + || true.
      - git fetch --unshallow origin || git fetch origin || true
      # force: der gigalixir-master ist nur ein Deploy-Pointer (kein Source-of-
      # Truth). Bei Divergenz (alter/manueller Deploy-Stand) würde ein normaler
      # Push mit "rejected (fetch first)" scheitern — Standard bei PaaS-Deploys.
      - git push --force gigalixir HEAD:refs/heads/master
    depends_on: [compile, test]
